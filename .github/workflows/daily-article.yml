name: Daily NEET Article

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

jobs:
  generate-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install anthropic
      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_article.py
      - name: Commit and push new article
        run: |
          git config user.name "NEETSuccess Bot"
          git config user.email "bot@neetsuccess.com"
          git add -A
          git diff --staged --quiet || git commit -m "Daily article: $(date +%Y-%m-%d)"
          git push
